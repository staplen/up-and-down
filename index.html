<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Up &amp; Down the River</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Setup Phase -->
    <div id="view-setup" class="view" data-phase="setup"></div>

    <!-- Round Start Phase -->
    <div id="view-round-start" class="view" data-phase="roundStart"></div>

    <!-- Bidding Phase -->
    <div id="view-bidding" class="view" data-phase="bidding"></div>

    <!-- Trick Play Phase -->
    <div id="view-trick-play" class="view" data-phase="trickPlay"></div>

    <!-- Round End Phase -->
    <div id="view-round-end" class="view" data-phase="roundEnd"></div>

    <!-- Game Over Phase -->
    <div id="view-game-over" class="view" data-phase="gameOver"></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
